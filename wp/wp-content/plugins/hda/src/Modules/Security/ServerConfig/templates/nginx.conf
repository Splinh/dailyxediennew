# ==============================================================================
# Theme Server Config (Nginx) - Generated by HDAddons
# Include this file in your server {} block:
#   include /path/to/nginx-theme.conf;
# Then reload Nginx: sudo nginx -t && sudo systemctl reload nginx
# ==============================================================================

# ----------------------------------------------
# SECURITY HEADERS
# ----------------------------------------------
add_header Content-Security-Policy "upgrade-insecure-requests;" always;
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

# X-Robots-Tag for CSS/JS
location ~* \.(css|js)$ {
    add_header X-Robots-Tag "noindex, nofollow";
    expires 1M;
    access_log off;
}

# ----------------------------------------------
# PROTECT SENSITIVE FILES
# ----------------------------------------------
location ~* /(\.|composer\.(json|lock)|package(-lock)?\.json|pnpm-lock\.yaml|phpunit\.xml|wp-cli\.yml|wp-config\.php|wp-config-sample\.php|README\.md|LICENSE|CHANGELOG(\.md)?)$ {
    deny all;
    return 403;
}

# ----------------------------------------------
# BLOCK VCS / IDE FOLDERS
# ----------------------------------------------
location ~ /\.(git|svn|hg|idea|vscode) {
    deny all;
    return 403;
}

# ----------------------------------------------
# DISABLE PHP IN UPLOADS
# ----------------------------------------------
location ~* /wp-content/uploads/.*\.(php[0-9]?|phar|phtml|phps)$ {
    deny all;
    return 403;
}

# ----------------------------------------------
# DIRECTORY LISTING OFF
# ----------------------------------------------
autoindex off;

# ----------------------------------------------
# GZIP COMPRESSION
# ----------------------------------------------
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    application/javascript
    application/json
    application/rss+xml
    application/vnd.ms-fontobject
    application/xhtml+xml
    application/xml
    font/opentype
    font/otf
    font/ttf
    image/svg+xml
    image/x-icon
    text/css
    text/javascript
    text/plain
    text/xml;

# ----------------------------------------------
# STATIC FILE CACHING
# ----------------------------------------------
location ~* \.(jpe?g|png|gif|svg|webp|avif|ico)$ {
    expires 6M;
    access_log off;
    add_header Cache-Control "public, immutable";
    add_header Vary Accept;
}

location ~* \.(woff2?|ttf|otf|eot)$ {
    expires 6M;
    access_log off;
    add_header Cache-Control "public, immutable";
    add_header Access-Control-Allow-Origin "*";
}
