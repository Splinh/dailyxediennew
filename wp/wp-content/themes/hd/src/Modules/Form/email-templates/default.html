<h2 style="font-size:20px;font-weight:600;color:#1e293b;margin:0 0 16px;padding-bottom:8px;border-bottom:1px solid #e2e8f0;">New Form Submission</h2>

<table width="100%" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;width:100%;margin-bottom:24px;font-size:14px;">
<tr>
	<td style="border:1px solid #e2e8f0;padding:8px;font-weight:600;color:#334155;width:35%;background:#f8fafc;">Name</td>
	<td style="border:1px solid #e2e8f0;padding:8px;color:#475569;">{{name}}</td>
</tr>
<tr>
	<td style="border:1px solid #e2e8f0;padding:8px;font-weight:600;color:#334155;width:35%;background:#f8fafc;">Email</td>
	<td style="border:1px solid #e2e8f0;padding:8px;color:#475569;">{{email}}</td>
</tr>
<tr>
	<td style="border:1px solid #e2e8f0;padding:8px;font-weight:600;color:#334155;width:35%;background:#f8fafc;">Phone</td>
	<td style="border:1px solid #e2e8f0;padding:8px;color:#475569;">{{phone}}</td>
</tr>
<tr>
	<td style="border:1px solid #e2e8f0;padding:8px;font-weight:600;color:#334155;width:35%;background:#f8fafc;">Page</td>
	<td style="border:1px solid #e2e8f0;padding:8px;color:#475569;">{{page_url}}</td>
</tr>
</table>

<h3 style="font-size:16px;font-weight:600;color:#334155;margin:0 0 12px;">Message</h3>
<p style="margin:0 0 16px;color:#475569;line-height:1.6;">{{message}}</p>

{{fields_table}}

<hr style="border:0;border-top:1px solid #e2e8f0;margin:24px 0;" />
<p style="margin:0;font-size:12px;color:#94a3b8;line-height:1.5;">
	Form: {{form_type_label}} · ID: #{{entry_id}} · Submitted: {{created_at}}<br />
	IP: {{ip_address}}
</p>
